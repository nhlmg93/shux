name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GHOSTTY_REF: dcc39dcd401975ee77a642fa15ba7bb9f6d85b96
  PKG_CONFIG_PATH: ${{ github.workspace }}/ghostty-build/usr/lib/pkgconfig
  GOPLS_VERSION: v0.21.1
  GOFUMPT_VERSION: v0.9.2
  GOLANGCI_LINT_VERSION: v2.11.4

jobs:
  check:
    name: check
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Restore Go tool cache
        id: go-tools-cache
        uses: actions/cache@v4
        with:
          path: ~/go/bin
          key: ${{ runner.os }}-${{ runner.arch }}-go-tools-${{ env.GOPLS_VERSION }}-${{ env.GOFUMPT_VERSION }}-${{ env.GOLANGCI_LINT_VERSION }}

      - name: Install Go tooling
        if: steps.go-tools-cache.outputs.cache-hit != 'true'
        run: |
          go install golang.org/x/tools/gopls@${{ env.GOPLS_VERSION }}
          go install mvdan.cc/gofumpt@${{ env.GOFUMPT_VERSION }}
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@${{ env.GOLANGCI_LINT_VERSION }}

      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Run checks
        run: make check

  ghostty-vt:
    name: ghostty vt
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up native build environment
        uses: ./.github/actions/setup-ghostty-vt
        with:
          ghostty-ref: ${{ env.GHOSTTY_REF }}
          packages: pkg-config gcc g++

      - name: Upload Ghostty VT artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghostty-vt-${{ env.GHOSTTY_REF }}
          path: ghostty-build/usr
          if-no-files-found: error
          include-hidden-files: true

  build-binary:
    name: build binary
    runs-on: ubuntu-latest
    needs: ghostty-vt
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install native link dependencies
        run: |
          missing=()
          for pkg in pkg-config gcc g++; do
            if ! dpkg-query -W -f='${Status}' "$pkg" 2>/dev/null | grep -q 'install ok installed'; then
              missing+=("$pkg")
            fi
          done

          if [ "${#missing[@]}" -eq 0 ]; then
            echo "native deps already installed: pkg-config gcc g++"
            exit 0
          fi

          sudo apt-get update
          sudo apt-get install -y "${missing[@]}"

      - name: Download Ghostty VT artifact
        uses: actions/download-artifact@v4
        with:
          name: ghostty-vt-${{ env.GHOSTTY_REF }}
          path: ghostty-build/usr

      - name: Build shux binary
        run: make build

  cmd-tests:
    name: cmd tests
    runs-on: ubuntu-latest
    needs: ghostty-vt
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install native link dependencies
        run: |
          missing=()
          for pkg in pkg-config gcc g++; do
            if ! dpkg-query -W -f='${Status}' "$pkg" 2>/dev/null | grep -q 'install ok installed'; then
              missing+=("$pkg")
            fi
          done

          if [ "${#missing[@]}" -eq 0 ]; then
            echo "native deps already installed: pkg-config gcc g++"
            exit 0
          fi

          sudo apt-get update
          sudo apt-get install -y "${missing[@]}"

      - name: Download Ghostty VT artifact
        uses: actions/download-artifact@v4
        with:
          name: ghostty-vt-${{ env.GHOSTTY_REF }}
          path: ghostty-build/usr

      - name: Run cmd/shux tests
        run: go test ./cmd/shux -v -count=1

  pkg-tests:
    name: pkg tests (unit/integration)
    runs-on: ubuntu-latest
    needs: ghostty-vt
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install native link dependencies
        run: |
          missing=()
          for pkg in pkg-config gcc g++; do
            if ! dpkg-query -W -f='${Status}' "$pkg" 2>/dev/null | grep -q 'install ok installed'; then
              missing+=("$pkg")
            fi
          done

          if [ "${#missing[@]}" -eq 0 ]; then
            echo "native deps already installed: pkg-config gcc g++"
            exit 0
          fi

          sudo apt-get update
          sudo apt-get install -y "${missing[@]}"

      - name: Download Ghostty VT artifact
        uses: actions/download-artifact@v4
        with:
          name: ghostty-vt-${{ env.GHOSTTY_REF }}
          path: ghostty-build/usr

      - name: Run local test suite
        run: make test

  ci-tests:
    name: ci tests (docker)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build cached Docker test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.test
          load: true
          tags: shux-test:ci
          build-args: |
            GHOSTTY_REF=${{ env.GHOSTTY_REF }}
          cache-from: type=gha,scope=docker-test
          cache-to: type=gha,mode=max,scope=docker-test

      - name: Run Docker-backed CI suite
        run: docker run --rm shux-test:ci
