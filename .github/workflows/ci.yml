name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GHOSTTY_REF: dcc39dcd401975ee77a642fa15ba7bb9f6d85b96
  PKG_CONFIG_PATH: ${{ github.workspace }}/ghostty-build/usr/lib/pkgconfig
  SHUX_E2E: "1"

jobs:
  cmd-tests:
    name: cmd tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up native build environment
        uses: ./.github/actions/setup-ghostty-vt
        with:
          ghostty-ref: ${{ env.GHOSTTY_REF }}
          packages: pkg-config gcc g++

      - name: Run cmd/shux tests
        run: go test ./cmd/shux -v -count=1

  build-binary:
    name: build binary
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up native build environment
        uses: ./.github/actions/setup-ghostty-vt
        with:
          ghostty-ref: ${{ env.GHOSTTY_REF }}
          packages: pkg-config gcc g++

      - name: Build shux binary
        run: go build ./cmd/shux

  pkg-tests:
    name: pkg tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up native test environment
        uses: ./.github/actions/setup-ghostty-vt
        with:
          ghostty-ref: ${{ env.GHOSTTY_REF }}
          packages: pkg-config gcc g++ nano vim less

      - name: Run pkg/shux tests
        run: go test ./pkg/shux -v -count=1
