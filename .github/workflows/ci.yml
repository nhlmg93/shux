name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GHOSTTY_REF: dcc39dcd401975ee77a642fa15ba7bb9f6d85b96
  PKG_CONFIG_PATH: ${{ github.workspace }}/ghostty-build/usr/lib/pkgconfig
  SHUX_E2E: "1"

jobs:
  check:
    name: check
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Go tooling
        run: |
          go install golang.org/x/tools/gopls@v0.21.1
          go install mvdan.cc/gofumpt@v0.9.2
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4

      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Run checks
        run: make check

  build-binary:
    name: build binary
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up native build environment
        uses: ./.github/actions/setup-ghostty-vt
        with:
          ghostty-ref: ${{ env.GHOSTTY_REF }}
          packages: pkg-config gcc g++

      - name: Build shux binary
        run: make build

  cmd-tests:
    name: cmd tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up native build environment
        uses: ./.github/actions/setup-ghostty-vt
        with:
          ghostty-ref: ${{ env.GHOSTTY_REF }}
          packages: pkg-config gcc g++

      - name: Run cmd/shux tests
        run: go test ./cmd/shux -v -count=1

  pkg-tests:
    name: pkg tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up native test environment
        uses: ./.github/actions/setup-ghostty-vt
        with:
          ghostty-ref: ${{ env.GHOSTTY_REF }}
          packages: pkg-config gcc g++ nano vim less

      - name: Run pkg/shux tests
        run: go test ./pkg/shux -v -count=1
