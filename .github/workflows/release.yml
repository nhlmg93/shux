name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make git pkg-config gcc g++ libc6-dev

      - name: Build shux
        run: make build

      - name: Package binary
        run: |
          mkdir -p dist
          cp shux dist/shux-linux-amd64
          tar -czf dist/shux-linux-amd64.tar.gz -C dist shux-linux-amd64

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/shux-linux-amd64.tar.gz
          generate_release_notes: true
